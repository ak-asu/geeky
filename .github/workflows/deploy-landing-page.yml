name: Deploy Landing Page

on:
  push:
    branches:
      - main
    paths:
      - 'landing-page/**'
      - '.github/workflows/deploy-landing-page.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify GitHub Pages is enabled
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status_code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")

          if [ "$status_code" = "404" ]; then
            echo "::error title=GitHub Pages is not enabled::Enable Pages in repository Settings > Pages and choose GitHub Actions as the source. This workflow cannot bootstrap Pages with GITHUB_TOKEN."
            exit 1
          fi

          if [ "$status_code" != "200" ]; then
            echo "::error title=GitHub Pages check failed::Unexpected Pages API status: $status_code"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./landing-page

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

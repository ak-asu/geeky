name: geeky
description: 'Notes Recall'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.1.0

  # Local database
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.5.41

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^7.2.0

  # Network
  dio: ^5.9.1
  connectivity_plus: ^7.0.0

  # UI
  flex_color_scheme: ^8.4.0
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  markdown_widget: ^2.3.2+8
  fl_chart: ^1.1.1
  graphview: ^1.5.1
  google_fonts: ^8.0.1

  # Utility
  shared_preferences: ^2.5.4
  uuid: ^4.5.2
  path_provider: ^2.1.5
  path: ^1.9.1
  url_launcher: ^6.3.2

  # Features
  file_picker: ^10.3.10
  flutter_tts: ^4.2.5
  share_handler: ^0.0.23
  image_picker: ^1.2.1
  record: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.11.1
  riverpod_generator: ^4.0.0+1
  flutter_launcher_icons:
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  drift_dev: ^2.31.0

flutter_launcher_icons:
  image_path: "assets/images/playstore.png"
  android: true
  ios: false
  windows:
    generate: false
    image_path: "assets/images/playstore.png"
    icon_size: 48 # min: 48, max: 256, default: 48
  # adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/playstore.png"
  min_sdk_android: 21
  background_color_ios: "#FFFFFF"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/images/
